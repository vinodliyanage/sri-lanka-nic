name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write 

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Build Library
        run: pnpm --filter @sri-lanka/nic build

      - name: Publish to NPM (with Provenance)
        # The --provenance flag tells NPM to use the OIDC token from GitHub Actions
        run: pnpm --filter @sri-lanka/nic publish --access public --provenance --no-git-checks
